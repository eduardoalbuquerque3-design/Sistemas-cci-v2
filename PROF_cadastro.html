<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCI - Home</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="PROF_cadastro.html">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar-custom">
        <div class="container d-flex align-items-center justify-content-between py-2">
            <div class="logo-area">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhCEBRiOnJ4WSaugF7R9v1NsEo_3cIbNliFA&s"
                    class="logo-img">
            </div>
            <div class="menu-links d-flex gap-2 align-items-center">
                <a href="PROF_painel.html" class="nav-link-custom">Inicio</a>
                <a href="PROF_turmas.html" class="nav-link-custom">Turmas</a>
                <a href="PROF_notas.html" class="nav-link-custom">Notas</a>
                <a href="PROF_dashboard.html" class="nav-link-custom">Painel</a>
                <button class="btn-sair" onclick="fazerLogout()">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <h1 class="bem-vindo">Bem-Vindo, <span id="nome-usuario"></span>!</h1>
        <h3 class="bem-vindo">Por favor preencha os campos abaixo:</h3>
        <hr class="linha-preta">

        <main class="container2">
            <div class="card-branco">
                <form id="formCadastro" class="form-corpo">
                    <div class="caixa-azul-interna">
                        <div class="input-group">
                            <input type="text" placeholder="Nome" required>
                            <input type="text" id="cpf" placeholder="CPF" required maxlength="14"
                                oninput="mascaraCPF(this)">
                            <input type="email" placeholder="Email" required>
                            <input type="password" placeholder="Senha" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-cadastrar">Cadastrar</button>
                </form>
            </div>
        </main>


        <script>
            function mascaraCPF(i) {
                let v = i.value.replace(/\D/g, "");
                if (v.length <= 11) {
                    v = v.replace(/(\d{3})(\d)/, "$1.$2");
                    v = v.replace(/(\d{3})(\d)/, "$1.$2");
                    v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
                }
                i.value = v;
            }
            function fazerLogout() {
                if (confirm("Deseja realmente sair?")) {
                    localStorage.clear();
                    window.location.href = "index.html";
                }
            }
        </script>
        <script src="cadastro.js"></script>
</body>

</html>
