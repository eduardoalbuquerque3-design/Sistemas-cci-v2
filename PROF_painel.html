<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCI - Home</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <link rel="stylesheet" href="CORD_painel.css">
</head>

<body>

    <nav class="navbar-custom">
        <div class="container d-flex align-items-center justify-content-between py-2">
            <div class="logo-area">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhCEBRiOnJ4WSaugF7R9v1NsEo_3cIbNliFA&s"
                    class="logo-img">
            </div>
            <div class="menu-links d-flex gap-2 align-items-center">
                <a href="PROF_painel.html" class="nav-link-custom">Inicio</a>
                <a href="PROF_turmas.html" class="nav-link-custom">Turmas</a>
                <a href="PROF_notas.html" class="nav-link-custom">Notas</a>
                <a href="PROF_dashboard.html" class="nav-link-custom">Painel</a>
                <button class="btn-sair" onclick="fazerLogout()">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">Bem-Vindo, <span id="nome-usuario" class="text-success">...</span>!</h1>
        <hr class="linha-preta">

        <div class="row justify-content-center mt-5">

            <div class="col-md-3">
                <div class="card-cci" onclick="window.location.href='PROF_turmas.html'">
                    <div class="card-topo verde">
                        <span class="material-icons-outlined">groups</span>
                    </div>
                    <div class="card-baixo">
                        <h3>Turmas</h3>
                        <p>4 turmas ativas</p>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-cci" onclick="window.location.href='PROF_notas.html'">
                    <div class="card-topo azul">
                        <span class="material-icons-outlined">edit_note</span>
                    </div>
                    <div class="card-baixo">
                        <h3>Notas</h3>
                        <p>Controle de notas</p>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-cci" onclick="window.location.href='painel.html'">
                    <div class="card-topo verde-claro">
                        <span class="material-icons-outlined">leaderboard</span>
                    </div>
                    <div class="card-baixo">
                        <h3>Painel</h3>
                        <p>Quadro de informações</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>

        document.addEventListener('DOMContentLoaded', () => {
            const nomeSalvo = localStorage.getItem('usuarioNome');
            if (nomeSalvo) {
                document.getElementById('nome-usuario').textContent = nomeSalvo;
            } else {

                window.location.href = "telalogin.html";
            }
        });


        function fazerLogout() {
            if (confirm("Deseja realmente sair?")) {
                localStorage.clear();
                window.location.href = "telalogin.html";
            }
        }
    </script>
    <script src="auth.js"></script>
</body>

</html>
