<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Escolar - Sistema de Gestão</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="CORD_dashboard.css">
</head>

<body>

    <nav class="navbar-custom">
        <div class="container d-flex align-items-center justify-content-between py-2">
            <div class="logo-area">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhCEBRiOnJ4WSaugF7R9v1NsEo_3cIbNliFA&s"
                    class="logo-img">
            </div>
            <div class="menu-links d-flex gap-2 align-items-center">
                <a href="PROF_painel.html" class="nav-link-custom">Inicio</a>
                <a href="PROF_turmas.html" class="nav-link-custom">Turmas</a>
                <a href="PROF_notas.html" class="nav-link-custom">Notas</a>
                <a href="PROF_dashboard.html" class="nav-link-custom">Painel</a>
                <button class="btn-sair" onclick="fazerLogout()">Sair</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-content">
        <div class="header">
            <h1>Dashboard Acadêmico</h1>
            <p>Análise de Desempenho e Frequência em Tempo Real</p>
        </div>

        <div class="summary">
            <div class="stat-item">Alunos Ativos<span id="totalAlunos">0</span></div>
            <div class="stat-item">Média de Faltas<span id="mediaFaltas">0</span></div>
        </div>

        <div class="card card-filter mb-4">
            <h3>Filtros de Visualização</h3>
            <div class="filter-group">
                <div class="filter-section">
                    <span>Turma:</span>
                    <button class="btn-filter active" onclick="filtrar('turma', 'TODAS', this)">Todas</button>
                    <button class="btn-filter" onclick="filtrar('turma', 'Sala 01', this)">Sala 01</button>
                    <button class="btn-filter" onclick="filtrar('turma', 'Sala 02', this)">Sala 02</button>
                    <button class="btn-filter" onclick="filtrar('turma', 'Sala 03', this)">Sala 03</button>
                    <button class="btn-filter" onclick="filtrar('turma', 'Sala 04', this)">Sala 04</button>
                </div>
                <div class="filter-section">
                    <span>Turno:</span>
                    <button class="btn-filter active" onclick="filtrar('turno', 'TODOS', this)">Todos</button>
                    <button class="btn-filter" onclick="filtrar('turno', 'Manhã', this)">Manhã</button>
                    <button class="btn-filter" onclick="filtrar('turno', 'Tarde', this)">Tarde</button>
                </div>
                <div class="filter-section">
                    <span>Matéria:</span>
                    <button class="btn-filter active" onclick="filtrar('disciplina', 'TODAS', this)">Todas</button>
                    <button class="btn-filter" onclick="filtrar('disciplina', ' ', this)">Inglês</button>
                    <button class="btn-filter" onclick="filtrar('disciplina', 'ESPANHOL', this)">Espanhol</button>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="card">
                <h3>Total de Faltas por Turma</h3>
                <div class="chart-container">
                    <canvas id="chartFaltas"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Média de Notas por Turma</h3>
                <div class="chart-container">
                    <canvas id="chartMedias"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Desempenho Geral (Aproveitamento)</h3>
                <div class="chart-container">
                    <canvas id="chartDesempenho"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="CORD_dashboard.js"></script>
    <script>
        function fazerLogout() {
            if (confirm("Deseja realmente sair?")) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        }
    </script>
</body>

</html>
